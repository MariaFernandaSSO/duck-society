<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projetos — The Duck Society</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <style>
    .work-in-progress {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 60vh;
      gap: 1.5rem;
    }
    .work-duck {
      width: min(80vw, 600px);
      filter: var(--logo-filter);
      opacity: 0.6;
    }
    .work-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
    }
    .work-msg {
      font-size: 1.2rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <main>
    <section class="work-in-progress">
      <img src="../assets/images/duck-work-progress.svg" alt="Em desenvolvimento" class="work-duck" />
      <p class="work-title" data-i18n="projetos-title">Em breve</p>
      <p class="work-msg" data-i18n="projetos-msg">Portfólio em desenvolvimento...</p>
    </section>
  </main>

  <footer class="footer">
    <p>©2026 &nbsp; maria fernanda</p>
  </footer>

  <script src="../assets/js/main.js"></script>
</body>
</html>
